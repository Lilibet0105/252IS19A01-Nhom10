<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập | Đảo Truyện</title>

    <!-- Tailwind CSS CDN - Thư viện CSS tiện ích, giúp xây dựng giao diện nhanh chóng -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Cấu hình Tailwind tùy chỉnh: mở rộng font chữ và bảng màu riêng cho website -->
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              display: ["Playfair Display", "serif"], // Font cho tiêu đề lớn, sang trọng
              body: ["Lora", "serif"], // Font cho văn bản, dễ đọc
            },
            colors: {
              cream: "#faf7f2", // Màu nền kem chủ đạo
              ink: "#1a1a1a", // Màu chữ đậm
              amber: "#d97706", // Màu nhấn (cam)
              muted: "#6b7280", // Màu xám nhẹ cho text phụ
            },
          },
        },
      };
    </script>
    <!-- Google Fonts: Playfair Display và Lora -->
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Lora:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      /* CSS tùy chỉnh: ghi đè font và màu nền mặc định cho toàn bộ trang */
      body {
        font-family: "Lora", serif;
        background-color: #faf7f2;
        color: #1a1a1a;
      }
    </style>
  </head>
  <!-- 
       BODY — Nền gradient từ cream qua white đến amber-50
       Tạo hiệu ứng chuyển màu nhẹ nhàng, tinh tế, chiều cao tối thiểu full màn hình
   -->
  <body class="min-h-screen bg-gradient-to-br from-cream via-white to-amber-50">
    <!-- 
         HEADER — Logo và link quay về trang chủ
         Giúp người dùng dễ dàng điều hướng trở lại trang chính
     -->
    <header
      class="border-b border-gray-200 bg-white/95 backdrop-blur-sm shadow-sm"
    >
      <div class="max-w-5xl mx-auto px-4 py-5">
        <a href="../index.html" class="inline-flex items-center gap-3">
          <!-- Logo của Đảo Truyện - hiển thị bên cạnh tên trang -->
          <img
            src="../assets/logo.jpg"
            alt="Đảo Truyện"
            class="h-12 w-auto object-contain"
          />
          <div class="space-y-0.5">
            <p class="text-sm text-muted">Đảo Truyện</p>
            <p
              class="text-base font-semibold text-ink hover:text-amber transition"
            >
              Trang chủ
            </p>
          </div>
        </a>
      </div>
    </header>

    <!-- 
         MAIN — Form đăng nhập tài khoản người dùng
         - Card bo góc lớn (rounded-[2rem]), shadow mạnh và viền màu cam nhạt
         - Form gồm 2 trường bắt buộc: Email, Mật khẩu
         - Checkbox "Nhớ tôi" và link "Quên mật khẩu" (dự phòng)
         - Nút submit gradient từ amber sang orange-500
         - Link chuyển sang trang đăng ký cho người chưa có tài khoản
  -->
    <main
      class="flex min-h-[calc(100vh-100px)] items-center justify-center px-4 py-16"
    >
      <!-- Card form đăng nhập - thiết kế nổi bật với hiệu ứng đổ bóng và viền màu cam nhạt -->
      <section
        class="w-full max-w-lg rounded-[2rem] border border-gray-200 bg-white/95 p-10 shadow-2xl shadow-amber/15 ring-1 ring-amber-100"
      >
        <!-- Tiêu đề form — font-display (Playfair Display), font-black đậm nhất -->
        <div class="mb-10 text-center">
          <!-- Đường kẻ trang trí màu cam ở giữa tiêu đề -->
          <div class="mx-auto mb-4 h-1.5 w-24 rounded-full bg-amber"></div>
          <h1 class="text-5xl font-display font-black tracking-tight text-ink">
            Đăng Nhập
          </h1>
          <p class="mx-auto mt-4 max-w-sm text-sm text-muted">
            Nhập email và mật khẩu để tiếp tục
          </p>
        </div>

        <!-- Form đăng nhập — input có bo góc tròn lớn (rounded-3xl) -->
        <!-- Khi focus: viền chuyển sang màu cam và có hiệu ứng bóng mờ -->
        <form id="loginForm" class="space-y-6">
          <div class="space-y-5">
            <!-- Trường Email - dùng type="email" để trình duyệt tự động kiểm tra định dạng email -->
            <div>
              <label for="email" class="block text-sm font-semibold text-ink"
                >Email</label
              >
              <input
                id="email"
                name="email"
                type="email"
                required
                placeholder="viet@example.com"
                class="mt-3 w-full rounded-3xl border border-gray-200 bg-gray-50 px-5 py-4 text-sm text-ink outline-none transition duration-200 focus:border-amber focus:ring-2 focus:ring-amber/20"
              />
            </div>

            <!-- Trường Mật khẩu - dùng type="password" để ẩn ký tự khi nhập -->
            <div>
              <label for="password" class="block text-sm font-semibold text-ink"
                >Mật khẩu</label
              >
              <input
                id="password"
                name="password"
                type="password"
                required
                placeholder="••••••••"
                class="mt-3 w-full rounded-3xl border border-gray-200 bg-gray-50 px-5 py-4 text-sm text-ink outline-none transition duration-200 focus:border-amber focus:ring-2 focus:ring-amber/20"
              />
            </div>
          </div>

          <!-- Checkbox "Nhớ tôi" + Link "Quên mật khẩu" (trang quên mật khẩu chưa được triển khai đầy đủ) -->
          <div
            class="mt-1 flex items-center justify-between text-sm text-muted"
          >
            <label class="inline-flex items-center gap-2">
              <input
                type="checkbox"
                class="h-4 w-4 rounded border-gray-300 text-amber focus:ring-amber"
              />
              Nhớ tôi
            </label>
            <a
              href="./quenmatkhau.html"
              class="text-amber font-medium hover:text-ink transition"
              >Quên mật khẩu?</a
            >
          </div>

          <!-- Nút Đăng nhập — gradient màu cam nổi bật, có hiệu ứng hover đổi màu -->
          <button
            type="submit"
            class="mt-4 w-full rounded-3xl bg-gradient-to-r from-amber to-orange-500 px-6 py-4 text-base font-semibold text-white shadow-lg shadow-amber/20 transition duration-200 hover:from-orange-600 hover:to-amber-600"
          >
            Đăng nhập
          </button>
        </form>

        <!-- Link chuyển sang trang đăng ký cho người dùng chưa có tài khoản -->
        <p class="mt-6 text-center text-sm text-muted">
          Bạn chưa có tài khoản?
          <a
            href="./dangky.html"
            class="font-semibold text-amber hover:text-ink transition"
            >Đăng ký ngay</a
          >
        </p>
      </section>
    </main>

    <!-- 
         SCRIPT — Xử lý logic form đăng nhập (JavaScript thuần)
         - Kiểm tra các trường email và mật khẩu không được để trống
         - Nếu hợp lệ: hiển thị thông báo thành công và chuyển hướng về trang chủ
         (Lưu ý: đây là bản demo, chưa kết nối với backend xác thực thực tế)
   -->
    <script>
      // Xử lý sự kiện submit của form đăng nhập
      document
        .getElementById("loginForm")
        .addEventListener("submit", function (event) {
          // Ngăn chặn hành vi reload trang mặc định của form
          event.preventDefault();

          // Lấy giá trị từ các trường input và loại bỏ khoảng trắng thừa (trim)
          const email = event.target.email.value.trim();
          const password = event.target.password.value.trim();

          // Kiểm tra cả hai trường đã được điền đầy đủ chưa
          if (!email || !password) {
            alert("Vui lòng nhập đầy đủ email và mật khẩu.");
            return; // Dừng xử lý nếu thiếu thông tin
          }

          // Mọi kiểm tra đều hợp lệ: thông báo thành công và chuyển hướng về trang chủ
          alert("Đăng nhập thành công! Đang chuyển về trang chủ...");
          window.location.href = "../index.html";
        });
    </script>
  </body>
</html>
