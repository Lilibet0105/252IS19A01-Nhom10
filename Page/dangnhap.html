<!doctype html>
<html lang="vi">
  <head>
    <!-- ═══════════════════════════════════════════
         HEAD — Tailwind CSS CDN + Google Fonts + config
         - Tailwind config: extend font (display, body) và màu (cream, ink, amber, muted)
         - Font: Playfair Display cho tiêu đề, Lora cho nội dung
    ═══════════════════════════════════════════ -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập | Đảo Truyện</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              display: ["Playfair Display", "serif"],
              body: ["Lora", "serif"],
            },
            colors: {
              cream: "#faf7f2",
              ink: "#1a1a1a",
              amber: "#d97706",
              muted: "#6b7280",
            },
          },
        },
      };
    </script>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Lora:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Lora", serif;
        background-color: #faf7f2;
        color: #1a1a1a;
      }
    </style>
  </head>
  <!-- BODY — Gradient nền từ cream qua white đến amber-50 -->
  <body class="min-h-screen bg-gradient-to-br from-cream via-white to-amber-50">
    <!-- HEADER — Logo + link về trang chủ -->
    <header class="border-b border-gray-200 bg-white/95 backdrop-blur-sm shadow-sm">
      <div class="max-w-5xl mx-auto px-4 py-5">
        <a href="../index.html" class="inline-flex items-center gap-3">
          <img src="../assets/logo.jpg" alt="Đảo Truyện" class="h-12 w-auto object-contain" />
          <div class="space-y-0.5">
            <p class="text-sm text-muted">Đảo Truyện</p>
            <p class="text-base font-semibold text-ink hover:text-amber transition">Trang chủ</p>
          </div>
        </a>
      </div>
    </header>

    <!-- ═══════════════════════════════════════════
         MAIN — Form đăng nhập
         - Card bo góc lớn (rounded-[2rem]), shadow-2xl + shadow amber
         - 2 trường: Email, Mật khẩu
         - Checkbox "Nhớ tôi" + link "Quên mật khẩu"
         - Nút submit gradient từ amber sang orange-500
         - Link chuyển sang trang đăng ký
    ═══════════════════════════════════════════ -->
    <main class="flex min-h-[calc(100vh-100px)] items-center justify-center px-4 py-16">
      <section class="w-full max-w-lg rounded-[2rem] border border-gray-200 bg-white/95 p-10 shadow-2xl shadow-amber/15 ring-1 ring-amber-100">
        <!-- Tiêu đề form — font-display (Playfair Display), font-black đậm nhất -->
        <div class="mb-10 text-center">
          <div class="mx-auto mb-4 h-1.5 w-24 rounded-full bg-amber"></div>
          <h1 class="text-5xl font-display font-black tracking-tight text-ink">Đăng Nhập</h1>
          <p class="mx-auto mt-4 max-w-sm text-sm text-muted">Nhập email và mật khẩu để tiếp tục</p>
        </div>

        <!-- Form đăng nhập — input rounded-3xl, focus:border-amber + focus:ring-amber/20 -->
        <form id="loginForm" class="space-y-6">
          <div class="space-y-5">
          <!-- Trường Email -->
          <div>
            <label for="email" class="block text-sm font-semibold text-ink">Email</label>
            <input
              id="email"
              name="email"
              type="email"
              required
              placeholder="viet@example.com"
              class="mt-3 w-full rounded-3xl border border-gray-200 bg-gray-50 px-5 py-4 text-sm text-ink outline-none transition duration-200 focus:border-amber focus:ring-2 focus:ring-amber/20"
            />
          </div>

          <!-- Trường Mật khẩu -->
          <div>
            <label for="password" class="block text-sm font-semibold text-ink">Mật khẩu</label>
            <input
              id="password"
              name="password"
              type="password"
              required
              placeholder="••••••••"
              class="mt-3 w-full rounded-3xl border border-gray-200 bg-gray-50 px-5 py-4 text-sm text-ink outline-none transition duration-200 focus:border-amber focus:ring-2 focus:ring-amber/20"
            />
          </div>
        </div>

        <!-- Checkbox "Nhớ tôi" + Link "Quên mật khẩu" -->
        <div class="mt-1 flex items-center justify-between text-sm text-muted">
          <label class="inline-flex items-center gap-2">
            <input type="checkbox" class="h-4 w-4 rounded border-gray-300 text-amber focus:ring-amber" />
            Nhớ tôi
          </label>
          <a href="./quenmatkhau.html" class="text-amber font-medium hover:text-ink transition">Quên mật khẩu?</a>
        </div>

        <!-- Nút Đăng nhập — gradient từ amber sang orange-500 -->
        <button
          type="submit"
          class="mt-4 w-full rounded-3xl bg-gradient-to-r from-amber to-orange-500 px-6 py-4 text-base font-semibold text-white shadow-lg shadow-amber/20 transition duration-200 hover:from-orange-600 hover:to-amber-600"
        >
          Đăng nhập
        </button>
        </form>

        <!-- Link chuyển sang trang đăng ký -->
        <p class="mt-6 text-center text-sm text-muted">
          Bạn chưa có tài khoản?
          <a href="./dangky.html" class="font-semibold text-amber hover:text-ink transition">Đăng ký ngay</a>
        </p>
      </section>
    </main>

    <!-- ═══════════════════════════════════════════
         SCRIPT — Xử lý form đăng nhập
         - Kiểm tra đầy đủ email và mật khẩu
         - Chuyển hướng về trang chủ sau khi thành công
    ═══════════════════════════════════════════ -->
    <script>
      // Xử lý sự kiện submit form đăng nhập
      document.getElementById('loginForm').addEventListener('submit', function (event) {
        // Ngăn form reload trang
        event.preventDefault();
        // Lấy giá trị từ các trường input
        const email = event.target.email.value.trim();
        const password = event.target.password.value.trim();
        // Kiểm tra đầy đủ thông tin
        if (!email || !password) {
          alert('Vui lòng nhập đầy đủ email và mật khẩu.');
          return;
        }
        // Đăng nhập thành công — chuyển hướng về trang chủ
        alert('Đăng nhập thành công! Đang chuyển về trang chủ...');
        window.location.href = '../index.html';
      });
    </script>
  </body>
</html>
