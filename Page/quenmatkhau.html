<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quên mật khẩu | Đảo Truyện</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              display: ["Playfair Display", "serif"],
              body: ["Lora", "serif"],
            },
            colors: {
              cream: "#faf7f2",
              ink: "#1a1a1a",
              amber: "#d97706",
              muted: "#6b7280",
            },
          },
        },
      };
    </script>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Lora:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Lora", serif;
        background-color: #faf7f2;
        color: #1a1a1a;
      }
    </style>
  </head>
  <body class="min-h-screen bg-gradient-to-br from-cream via-white to-amber-50">
    <header class="border-b border-gray-200 bg-white/95 backdrop-blur-sm shadow-sm">
      <div class="max-w-5xl mx-auto px-4 py-5">
        <a href="./dangnhap.html" class="inline-flex items-center gap-3">
          <img src="../assets/logo.jpg" alt="Đảo Truyện" class="h-12 w-auto object-contain" />
          <div class="space-y-0.5">
            <p class="text-sm text-muted">Đảo Truyện</p>
            <p class="text-base font-semibold text-ink hover:text-amber transition">Đăng nhập</p>
          </div>
        </a>
      </div>
    </header>

    <main class="flex min-h-[calc(100vh-100px)] items-center justify-center px-4 py-16">
      <section class="w-full max-w-lg rounded-[2rem] border border-gray-200 bg-white/95 p-10 shadow-2xl shadow-amber/15 ring-1 ring-amber-100">
        <div class="mb-10 text-center">
          <div class="mx-auto mb-4 h-1.5 w-24 rounded-full bg-amber"></div>
          <h1 class="text-5xl font-display font-black tracking-tight text-ink">Quên mật khẩu</h1>
          <p class="mx-auto mt-4 max-w-sm text-sm text-muted">Nhập email để nhận hướng dẫn đặt lại mật khẩu.</p>
        </div>
        <form id="resetPasswordForm" class="space-y-6">
          <div>
            <label for="email" class="block text-sm font-semibold text-ink">Email</label>
            <input
              id="email"
              name="email"
              type="email"
              required
              placeholder="viet@example.com"
              class="mt-3 w-full rounded-3xl border border-gray-200 bg-gray-50 px-5 py-4 text-sm text-ink outline-none transition duration-200 focus:border-amber focus:ring-2 focus:ring-amber/20"
            />
          </div>

          <button
            type="submit"
            class="w-full rounded-3xl bg-gradient-to-r from-amber to-orange-500 px-6 py-4 text-base font-semibold text-white shadow-lg shadow-amber/20 transition duration-200 hover:from-orange-600 hover:to-amber-600"
          >
            Gửi yêu cầu
          </button>

          <div id="resetSuccess" class="mt-4 hidden rounded-3xl border border-emerald-100 bg-emerald-50 px-5 py-4 text-sm text-emerald-800 shadow-sm">
            Yêu cầu đặt lại mật khẩu đã được gửi đến email của bạn.
          </div>
        </form>

        <p class="mt-6 text-center text-sm text-muted">
          Đã nhớ mật khẩu?
          <a href="./dangnhap.html" class="font-semibold text-amber hover:text-ink transition">Đăng nhập ngay</a>
        </p>
      </section>
    </main>

    <script>
      document.getElementById('resetPasswordForm').addEventListener('submit', function (event) {
        event.preventDefault();
        const email = event.target.email.value.trim();
        if (!email) {
          alert('Vui lòng nhập email.');
          return;
        }

        const successMessage = document.getElementById('resetSuccess');
        successMessage.classList.remove('hidden');
        successMessage.classList.add('block');

        // Optionally redirect after a short delay
        setTimeout(function () {
          window.location.href = './dangnhap.html';
        }, 2200);
      });
    </script>
  </body>
</html>
